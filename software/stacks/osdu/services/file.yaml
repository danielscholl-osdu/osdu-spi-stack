apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: file
  namespace: flux-system
spec:
  targetNamespace: osdu
  dependsOn:
    - name: legal
  interval: 30m
  chart:
    spec:
      chart: ./software/charts/osdu-spi-service
      sourceRef:
        kind: GitRepository
        name: osdu-spi-stack-system
  values:
    image:
      repository: community.opengroup.org:5555/osdu/platform/system/file/file-azure
      tag: "2b149c5ec48451034fbc2562c7cbe622f41843d1"
    redisTls: true
    istioProxyPin:
      enabled: true
    env:
      - name: SPRING_APPLICATION_NAME
        value: file
      - name: SERVER_SERVLET_CONTEXTPATH
        value: /api/file/
      - name: ACCEPT_HTTP
        value: "true"
      - name: AZURE_ISTIOAUTH_ENABLED
        value: "true"
      - name: AZURE_PAAS_WORKLOADIDENTITY_ISENABLED
        value: "true"
      - name: SPRING_CONFIG_NAME
        value: common,application
      - name: COSMOSDB_DATABASE
        value: osdu-db
      - name: OSDU_ENTITLEMENTS_APP_KEY
        value: OBSOLETE
      - name: AZURE_PUBSUB_PUBLISH
        value: "true"
      - name: SERVICE_BUS_ENABLED_STATUS
        value: "true"
      - name: SERVICE_BUS_TOPIC_STATUS
        value: statuschangedtopic
      - name: BATCH_SIZE
        value: "100"
      - name: SEARCH_QUERY_LIMIT
        value: "1000"
      - name: PARTITION_SERVICE_ENDPOINT
        value: http://partition/api/partition/v1
      - name: OSDU_ENTITLEMENTS_URL
        value: http://entitlements/api/entitlements/v2
      - name: authorizeAPI
        value: http://entitlements/api/entitlements/v2
      - name: OSDU_STORAGE_URL
        value: http://storage/api/storage/v2
      - name: SEARCH_HOST
        value: http://search/api/search/v2
