apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: legal
  namespace: flux-system
spec:
  targetNamespace: osdu
  dependsOn:
    - name: entitlements
  interval: 30m
  chart:
    spec:
      chart: ./software/charts/osdu-spi-service
      sourceRef:
        kind: GitRepository
        name: osdu-spi-stack-system
  values:
    image:
      repository: community.opengroup.org:5555/osdu/platform/security-and-compliance/legal/legal-azure
      tag: "2e82d5975a49564b64574190e492af403164637d"
    redisTls: true
    nodeSelector:
      agentpool: osdu
    tolerations:
      - key: workload
        operator: Equal
        value: "osdu"
        effect: NoSchedule
    env:
      - name: SPRING_APPLICATION_NAME
        value: legal
      - name: SERVER_SERVLET_CONTEXTPATH
        value: /api/legal/v1/
      - name: ACCEPT_HTTP
        value: "true"
      - name: AZURE_ISTIOAUTH_ENABLED
        value: "true"
      - name: AZURE_PAAS_WORKLOADIDENTITY_ISENABLED
        value: "true"
      - name: SPRING_CONFIG_NAME
        value: common,application
      - name: COSMOSDB_DATABASE
        value: osdu-db
      - name: AZURE_STORAGE_ENABLE_HTTPS
        value: "true"
      - name: AZURE_STORAGE_CONTAINER_NAME
        value: legal-service-azure-configuration
      - name: LEGAL_SERVICE_REGION
        value: us
      - name: SERVICEBUS_TOPIC_NAME
        value: legaltags
      - name: REDIS_DATABASE
        value: "2"
      - name: PARTITION_SERVICE_ENDPOINT
        value: http://partition/api/partition/v1
      - name: ENTITLEMENTS_SERVICE_ENDPOINT
        value: http://entitlements/api/entitlements/v2
      - name: ENTITLEMENTS_SERVICE_API_KEY
        value: OBSOLETE
