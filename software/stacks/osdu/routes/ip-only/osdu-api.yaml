apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: partition
  namespace: osdu
spec:
  parentRefs:
    - name: spi-gateway
      namespace: aks-istio-ingress
  rules:
    - matches:
        - path: { type: PathPrefix, value: /api/partition/ }
      backendRefs:
        - name: osdu-partition
          port: 80
---
