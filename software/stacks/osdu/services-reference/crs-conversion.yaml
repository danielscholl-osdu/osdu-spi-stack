apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crs-conversion
  namespace: flux-system
spec:
  targetNamespace: osdu
  interval: 30m
  install:
    timeout: 15m
    remediation:
      retries: 3
  upgrade:
    timeout: 15m
    remediation:
      retries: 3
  chart:
    spec:
      chart: ./software/charts/osdu-spi-service
      sourceRef:
        kind: GitRepository
        name: osdu-spi-stack-system
  values:
    image:
      repository: community.opengroup.org:5555/osdu/platform/system/reference/crs-conversion-service/crs-conversion-service-master
      tag: "08c9c5cd8b9e80e9cce05666d3fd425dbdf2d18b"
    nodeSelector:
      agentpool: osdu
    tolerations:
      - key: workload
        operator: Equal
        value: "osdu"
        effect: NoSchedule
    probes:
      liveness:
        path: /api/crs/converter/actuator/health
        port: 8080
        initialDelaySeconds: 250
      readiness:
        path: /api/crs/converter/actuator/health
        port: 8080
        initialDelaySeconds: 10
    env:
      - name: SPRING_APPLICATION_NAME
        value: crs-conversion
      - name: SERVER_SERVLET_CONTEXTPATH
        value: /api/crs/converter/
      - name: ACCEPT_HTTP
        value: "true"
      - name: AZURE_ISTIOAUTH_ENABLED
        value: "true"
      - name: AZURE_PAAS_WORKLOADIDENTITY_ISENABLED
        value: "true"
      - name: SIS_DATA
        value: /app/sis-data
    # Init container to download SIS reference data.
    # Uses Azure Linux 3.0 (MCR-hosted) with tdnf to install curl and tar.
    # Runs as root so tdnf can install; all capabilities dropped.
    initContainers:
      - name: download-sis-data
        image: mcr.microsoft.com/azurelinux/base/core:3.0
        command:
          - sh
          - -c
          - |
            tdnf install -y curl tar gzip ca-certificates
            mkdir -p /data/sis-data
            curl -sSL "https://community.opengroup.org/osdu/platform/system/reference/crs-conversion-service/-/archive/master/crs-conversion-service-master.tar.gz?path=appsettings/SISData" | tar xz -C /data/sis-data --strip-components=3
        volumeMounts:
          - name: sis-data
            mountPath: /data
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 384Mi
        securityContext:
          runAsUser: 0
          runAsNonRoot: false
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
    volumeMounts:
      - name: sis-data
        mountPath: /app/sis-data
        subPath: sis-data
    volumes:
      - name: sis-data
        emptyDir: {}
