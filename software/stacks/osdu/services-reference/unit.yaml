apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: unit
  namespace: flux-system
spec:
  targetNamespace: osdu
  interval: 30m
  install:
    timeout: 15m
    remediation:
      retries: 3
  upgrade:
    timeout: 15m
    remediation:
      retries: 3
  chart:
    spec:
      chart: ./software/charts/osdu-spi-service
      sourceRef:
        kind: GitRepository
        name: osdu-spi-stack-system
  values:
    image:
      repository: community.opengroup.org:5555/osdu/platform/system/reference/unit-service/unit-service-master
      tag: "0f1cff6478c4968cc4cd0d7ffc4ea2dcda104fd7"
    nodeSelector:
      agentpool: osdu
    tolerations:
      - key: workload
        operator: Equal
        value: "osdu"
        effect: NoSchedule
    probes:
      liveness:
        path: /api/unit/actuator/health
        port: 8080
        initialDelaySeconds: 250
      readiness:
        path: /api/unit/actuator/health
        port: 8080
        initialDelaySeconds: 10
    env:
      - name: SPRING_APPLICATION_NAME
        value: unit
      - name: SERVER_SERVLET_CONTEXTPATH
        value: /api/unit/
      - name: ACCEPT_HTTP
        value: "true"
      - name: AZURE_ISTIOAUTH_ENABLED
        value: "true"
      - name: AZURE_PAAS_WORKLOADIDENTITY_ISENABLED
        value: "true"
    # Init container to download unit catalog data
    initContainers:
      - name: download-catalog
        image: curlimages/curl:latest
        command:
          - sh
          - -c
          - curl -sSL -o /data/unit_catalog_v2.json https://community.opengroup.org/osdu/platform/system/reference/unit-service/-/raw/master/data/unit_catalog_v2.json
        volumeMounts:
          - name: unit-data
            mountPath: /data
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
              - ALL
    volumeMounts:
      - name: unit-data
        mountPath: /mnt/unit_catalogs
        readOnly: true
    volumes:
      - name: unit-data
        emptyDir: {}
