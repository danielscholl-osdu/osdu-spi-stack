apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crs-catalog
  namespace: flux-system
spec:
  targetNamespace: osdu
  interval: 30m
  chart:
    spec:
      chart: ./software/charts/osdu-spi-service
      sourceRef:
        kind: GitRepository
        name: osdu-spi-stack-system
  values:
    image:
      repository: community.opengroup.org:5555/osdu/platform/system/reference/crs-catalog-service/crs-catalog-service-azure
      tag: "49761e5b20118a9998b4a2a88d6e57eddd4d745e"
    nodeSelector:
      agentpool: osdu
    tolerations:
      - key: workload
        operator: Equal
        value: "osdu"
        effect: NoSchedule
    probes:
      liveness:
        path: /api/crs/catalog/actuator/health
        port: 8080
        initialDelaySeconds: 250
      readiness:
        path: /api/crs/catalog/actuator/health
        port: 8080
        initialDelaySeconds: 10
    env:
      - name: SPRING_APPLICATION_NAME
        value: crs-catalog
      - name: SERVER_SERVLET_CONTEXTPATH
        value: /api/crs/catalog/
      - name: ACCEPT_HTTP
        value: "true"
      - name: AZURE_ISTIOAUTH_ENABLED
        value: "true"
      - name: AZURE_PAAS_WORKLOADIDENTITY_ISENABLED
        value: "true"
