# CA-mirror Job: copies Redis and Elasticsearch TLS CAs from the platform
# namespace into the osdu namespace so the osdu-spi-service chart's
# import-ca-certs init container can add them to the Java truststore.
#
# Flux runs this Kustomization after both the Redis and Elasticsearch
# Kustomizations are marked Ready (see dependsOn in stack.yaml), so by
# the time the Job starts the source secrets almost always exist. The
# script still polls (up to 5 minutes) to handle edge cases where
# cert-manager or ECK is still writing the secret out.
#
# Script passes the raw base64 through without decoding, which preserves
# trailing newlines and avoids shell-escape issues with PEM payloads.
apiVersion: batch/v1
kind: Job
metadata:
  name: ca-mirror
  namespace: osdu
  annotations:
    # Ensure the Job body can change without rename collisions on re-apply.
    # Kustomize/Flux will recreate the Job on spec changes via prune.
    kustomize.config.k8s.io/needs-hash: "false"
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ca-mirror
        app.kubernetes.io/managed-by: osdu-spi-stack
    spec:
      serviceAccountName: ca-mirror
      restartPolicy: OnFailure
      containers:
        - name: kubectl
          image: docker.io/bitnami/kubectl:1.34.1
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              mirror() {
                local src_ns=$1 src=$2 dst_ns=$3 dst=$4 label=$5
                echo "[$label] waiting for $src_ns/$src"
                for i in $(seq 1 30); do
                  if kubectl get secret "$src" -n "$src_ns" >/dev/null 2>&1; then
                    break
                  fi
                  sleep 10
                  echo "[$label] waiting ($i/30)"
                done
                # Extract the base64 ca.crt field and round-trip it through
                # a manifest so the value is never decoded client-side.
                local b64
                b64=$(kubectl get secret "$src" -n "$src_ns" -o 'jsonpath={.data.ca\.crt}')
                if [ -z "$b64" ]; then
                  echo "[$label] ERROR: ca.crt missing in $src_ns/$src" >&2
                  exit 1
                fi
                cat <<EOF | kubectl apply -f -
              apiVersion: v1
              kind: Secret
              metadata:
                name: $dst
                namespace: $dst_ns
                labels:
                  app.kubernetes.io/managed-by: osdu-spi-stack
                  app.kubernetes.io/component: ca-mirror
              type: Opaque
              data:
                ca.crt: $b64
              EOF
                echo "[$label] mirrored -> $dst_ns/$dst"
              }

              mirror platform redis-tls-secret osdu redis-ca-cert Redis
              mirror platform elasticsearch-es-http-certs-public osdu elastic-ca-cert Elasticsearch
              echo "CA mirror complete"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
