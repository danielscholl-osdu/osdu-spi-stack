apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: airflow
  namespace: flux-system
spec:
  targetNamespace: platform
  interval: 30m
  timeout: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: airflow
      version: "1.16.*"
      sourceRef:
        kind: HelmRepository
        name: apache-airflow
  values:
    executor: KubernetesExecutor

    # Disable Helm hooks for Flux CD compatibility -- Flux manages ordering
    # via Kustomization dependsOn; hooks cause install timeouts
    useHelmHooks: false

    # Use external PostgreSQL (CNPG)
    postgresql:
      enabled: false
    data:
      metadataSecretName: airflow-metadata-secret

    # Disable PVC persistence -- use emptyDir to avoid storage bloat
    workers:
      persistence:
        enabled: false
    logs:
      persistence:
        enabled: false

    # Database migration job
    migrateDatabaseJob:
      enabled: true
      useHelmHooks: false
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          memory: 512Mi
      tolerations:
        - key: workload
          operator: Equal
          value: "platform"
          effect: NoSchedule
      nodeSelector:
        agentpool: platform
      securityContexts:
        pod:
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        container:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL

    # Create default admin user job
    createUserJob:
      useHelmHooks: false
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          memory: 512Mi
      tolerations:
        - key: workload
          operator: Equal
          value: "platform"
          effect: NoSchedule
      nodeSelector:
        agentpool: platform
      securityContexts:
        pod:
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        container:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL

    # Webserver
    webserver:
      replicas: 1
      defaultUser:
        enabled: true
        username: admin
        role: Admin
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi
      tolerations:
        - key: workload
          operator: Equal
          value: "platform"
          effect: NoSchedule
      nodeSelector:
        agentpool: platform
      securityContexts:
        pod:
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        container:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL

    # Scheduler
    scheduler:
      replicas: 1
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi
      logGroomerSidecar:
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 128Mi
      tolerations:
        - key: workload
          operator: Equal
          value: "platform"
          effect: NoSchedule
      nodeSelector:
        agentpool: platform
      securityContexts:
        pod:
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        container:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL

    # Triggerer
    triggerer:
      persistence:
        enabled: false
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      logGroomerSidecar:
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 128Mi
      tolerations:
        - key: workload
          operator: Equal
          value: "platform"
          effect: NoSchedule
      nodeSelector:
        agentpool: platform
      securityContexts:
        pod:
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        container:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL

    # StatsD sidecar (AKS Deployment Safeguards compliance)
    statsd:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          memory: 128Mi
      tolerations:
        - key: workload
          operator: Equal
          value: "platform"
          effect: NoSchedule
      nodeSelector:
        agentpool: platform
      securityContexts:
        pod:
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        container:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL

    # DAGs via git-sync (disabled; OSDU GitLab requires authentication)
    dags:
      gitSync:
        enabled: false

    # Config
    config:
      webserver:
        base_url: "http://localhost:8080/airflow"
