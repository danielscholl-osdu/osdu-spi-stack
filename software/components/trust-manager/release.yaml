apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trust-manager
  namespace: flux-system
spec:
  targetNamespace: foundation
  interval: 30m
  chart:
    spec:
      chart: trust-manager
      version: "v0.19.*"
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
  values:
    crds:
      enabled: true
    # Trust namespace = where source Secrets/ConfigMaps are read from.
    # Our source CAs live in platform (Redis via cert-manager, Elasticsearch
    # via ECK), so trust-manager watches that namespace for sources.
    app:
      trust:
        namespace: platform
    # Allow Bundle targets to write Secret (not just ConfigMap) outputs,
    # scoped to just the two names the osdu services need.
    secretTargets:
      enabled: true
      authorizedSecrets:
        - redis-ca-cert
        - elastic-ca-cert
    # AKS Automatic Safeguards compliance
    securityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi
