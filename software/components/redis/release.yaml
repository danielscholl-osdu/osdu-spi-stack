apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis
  namespace: flux-system
spec:
  targetNamespace: platform
  interval: 30m
  chart:
    spec:
      chart: redis
      version: "21.2.14"
      sourceRef:
        kind: HelmRepository
        name: bitnami
  values:
    architecture: replication
    auth:
      enabled: true
      existingSecret: redis-credentials
      existingSecretPasswordKey: password
    tls:
      enabled: true
      existingSecret: redis-tls-secret
      certFilename: tls.crt
      certKeyFilename: tls.key
      certCAFilename: ca.crt
    master:
      count: 1
      containerPorts:
        redis: 6380
      persistence:
        enabled: true
        storageClass: redis-storageclass
        size: 8Gi
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: "1"
          memory: 1Gi
      podSecurityContext:
        enabled: true
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containerSecurityContext:
        enabled: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
    replica:
      replicaCount: 2
      containerPorts:
        redis: 6380
      persistence:
        enabled: true
        storageClass: redis-storageclass
        size: 8Gi
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: "1"
          memory: 1Gi
      podSecurityContext:
        enabled: true
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containerSecurityContext:
        enabled: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
