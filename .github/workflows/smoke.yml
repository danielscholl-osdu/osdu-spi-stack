name: Smoke

# Real `spi up` against the Azure subscription. Provisioning takes ~15 minutes,
# Flux reconciliation another 10-30 minutes, plus teardown. Schedule + manual
# only -- never on PR. The orphan-RG sweeper is the safety net if this job's
# teardown is killed before it runs.

on:
  schedule:
    # 8 AM UTC daily, 4 hours after the sweeper sweep (4 AM UTC).
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      env_suffix:
        description: "RG/cluster env suffix (default: run-<id>)"
        type: string
        default: ""
      profile:
        description: "Deployment profile"
        type: choice
        options:
          - core
          - full
        default: core

permissions:
  contents: read
  id-token: write

concurrency:
  group: smoke
  cancel-in-progress: false

jobs:
  smoke:
    environment: azure-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      ENV_SUFFIX: ${{ inputs.env_suffix || format('run{0}', github.run_id) }}
      PROFILE: ${{ inputs.profile || 'core' }}
      AZURE_LOCATION: centralus
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv + Python
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: latest

      - name: Install kubelogin
        # AKS Automatic kubeconfigs reference kubelogin as their AAD exec
        # plugin; without it every kubectl call fails to authenticate.
        # Inlined rather than using azure/use-kubelogin@v1 because that
        # action requires GITHUB_TOKEN to resolve "latest" and we keep the
        # job permissions minimal.
        env:
          KUBELOGIN_VERSION: v0.1.4
        run: |
          set -euo pipefail
          curl -sSLo /tmp/kubelogin.zip \
            "https://github.com/Azure/kubelogin/releases/download/${KUBELOGIN_VERSION}/kubelogin-linux-amd64.zip"
          unzip -q /tmp/kubelogin.zip -d /tmp/kubelogin
          sudo install /tmp/kubelogin/bin/linux_amd64/kubelogin /usr/local/bin/kubelogin
          kubelogin --version

      - name: Install Helm
        # GitHub's ubuntu-latest runner sometimes preinstalls helm and
        # sometimes doesn't; install explicitly so the prereq check is
        # deterministic.
        uses: azure/setup-helm@v4
        with:
          version: 'v3.16.2'

      - name: Install Flux CLI
        uses: fluxcd/flux2/action@main

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Pre-cache Azure tokens and resolve deployer OID
        id: prelogin
        # GitHub OIDC JWTs live 5 min. Pre-fetch both ARM- and Graph-audience
        # access tokens while the JWT is fresh; az CLI caches them ~1h. Also
        # resolve the deployer SP's objectId here so spi up can skip the
        # mid-job Graph call that would otherwise hit AADSTS700024 (token
        # refresh against a dead JWT). `az ad sp show --id <appId>` is the
        # application-flow lookup; `az ad signed-in-user show` (the /me
        # endpoint) is delegated-only and fails for service principals.
        run: |
          set -euo pipefail
          # Pre-cache every audience spi up calls into, while the GitHub OIDC
          # JWT is still alive (5-min window). Any audience not cached forces
          # az to re-do the federated exchange later in the job and fails
          # with AADSTS700024 once the JWT has expired.
          #   - management.azure.com: ARM (most az + Bicep calls)
          #   - graph.microsoft.com:  az ad commands
          #   - 6dae42f8-...:         AKS AAD Server App (kubelogin azurecli mode)
          #   - vault.azure.net:      Key Vault (az keyvault secret set)
          az account get-access-token --resource https://management.azure.com -o none
          az account get-access-token --resource https://graph.microsoft.com -o none
          az account get-access-token --resource 6dae42f8-4368-4678-94ff-3960e28e3630 -o none
          az account get-access-token --resource https://vault.azure.net -o none
          OID=$(az ad sp show --id "${{ secrets.AZURE_CLIENT_ID }}" --query id -o tsv)
          if [ -z "$OID" ]; then
            echo "::error::Failed to resolve deployer service principal OID"
            exit 1
          fi
          echo "oid=$OID" >> "$GITHUB_OUTPUT"

      - name: Resolve env name
        id: env
        run: |
          set -euo pipefail
          # Strip non-alphanumerics from ENV_SUFFIX (Azure RG/cluster name constraints).
          SUFFIX=$(echo "$ENV_SUFFIX" | tr -cd '[:alnum:]')
          # Cap SUFFIX so that 'osdu' + 'ci' + SUFFIX + 'opendes' fits the
          # 24-char Azure storage account name limit (see config.py validator).
          # Budget: 24 - 4 - 2 - 7 = 11. Keep the trailing chars so 11-digit
          # github.run_id values stay unique.
          SUFFIX="${SUFFIX: -11}"
          RG="spi-stack-ci-${SUFFIX}"
          CREATED_UTC="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "rg=$RG" >> "$GITHUB_OUTPUT"
          echo "suffix=$SUFFIX" >> "$GITHUB_OUTPUT"
          echo "created=$CREATED_UTC" >> "$GITHUB_OUTPUT"
          echo "Resource group: $RG"

      - name: Quota guard (max 2 in-flight CI smoke RGs)
        run: |
          set -euo pipefail
          count=$(az group list --tag spi-ci-sweep-eligible=true --query 'length(@)' -o tsv)
          echo "In-flight smoke RGs: $count"
          if [ "$count" -gt 2 ]; then
            echo "::error::Too many in-flight smoke RGs ($count). Investigate before scheduling more."
            exit 1
          fi

      - name: Pre-create RG with sweeper tags
        run: |
          set -euo pipefail
          az group create \
            --name "${{ steps.env.outputs.rg }}" \
            --location "$AZURE_LOCATION" \
            --tags \
              spi-ci-sweep-eligible=true \
              "spi-created-utc=${{ steps.env.outputs.created }}" \
              github-run-id=${{ github.run_id }}

      - name: spi up
        env:
          SPI_DEPLOYER_OID: ${{ steps.prelogin.outputs.oid }}
        run: |
          uv sync --frozen
          uv run spi up \
            --env "ci-${{ steps.env.outputs.suffix }}" \
            --profile "$PROFILE" \
            --location "$AZURE_LOCATION"

      - name: Refresh Azure login (OIDC)
        # azure/login@v3 writes the federated assertion to disk once at login.
        # The OIDC JWT lives 5 min; the cached AAD access tokens live 1h. By
        # the time spi up finishes (~30 min in), the JWT is dead and any
        # token cache miss triggers AADSTS700024. Re-running azure/login here
        # writes a fresh JWT so the Flux wait keeps kubectl healthy for
        # another hour.
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Re-cache Azure tokens (post spi up)
        run: |
          set -euo pipefail
          # Warm the same audiences as the initial pre-cache. We only need
          # the AKS server-id for kubelogin during the Flux wait, but warm
          # all four so spi down also benefits.
          az account get-access-token --resource https://management.azure.com -o none
          az account get-access-token --resource 6dae42f8-4368-4678-94ff-3960e28e3630 -o none
          az account get-access-token --resource https://vault.azure.net -o none
          az account get-access-token --resource https://graph.microsoft.com -o none
          # Re-resolve cluster credentials so kubeconfig points at the
          # right cluster after the login refresh. cluster_name matches the
          # RG name in this repo's naming convention.
          az aks get-credentials \
            --resource-group "${{ steps.env.outputs.rg }}" \
            --name "${{ steps.env.outputs.rg }}" \
            --overwrite-existing \
            --only-show-errors
          kubelogin convert-kubeconfig -l azurecli

      - name: Wait for Flux Kustomizations to be Ready
        env:
          # Surface the SP creds so the wait script can re-run `az login`
          # mid-flight with a freshly-minted OIDC JWT. Without this, the
          # initial JWT expires (5-min lifetime), the 1h AAD token cache
          # eventually rotates, and kubectl silently loses auth.
          SPI_AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          SPI_AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: bash scripts/wait_for_flux_ready.sh --timeout 2700

      - name: Acceptance probe (gateway reachable)
        run: |
          set -euo pipefail
          # Smoke-level probe: gateway service exists and the Istio gateway
          # has at least one Ready pod. Service-level checks are out of scope
          # for the smoke; deeper acceptance lives in osdu-test skill.
          kubectl get svc -n aks-istio-ingress
          kubectl get pods -n aks-istio-ingress --field-selector=status.phase=Running

      - name: Capture diagnostics on failure
        if: failure()
        run: bash scripts/capture_diagnostics.sh "smoke-${{ github.run_id }}"

      - name: Upload diagnostics artifact
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-diagnostics-${{ github.run_id }}
          path: diagnostics/
          if-no-files-found: ignore

      - name: spi down (teardown)
        if: always()
        run: |
          uv run spi down --env "ci-${{ steps.env.outputs.suffix }}" || true

      - name: Force RG delete (backup teardown)
        if: always()
        run: |
          az group delete --name "${{ steps.env.outputs.rg }}" --yes --no-wait || true
